<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meetingraum-Konfigurator – v10.1</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root{--brand:#009DDF;--bg:#f5f4f1;--surface:#ffffff;--text:#131313;--muted:#666662;--line:#e6e4de;--line-strong:#d7d4cd;--ok:#1e7e34;--warn:#9a5f08;--radius:16px;--shadow:0 12px 28px rgba(20,20,20,.05);--shadow-card:0 14px 32px rgba(20,20,20,.06);--ease:cubic-bezier(.25,.46,.45,.94);--max:1280px}
    *,*::before,*::after{box-sizing:border-box}html,body{margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Sora',system-ui,sans-serif;min-height:100vh;padding:28px 16px 40px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    button,input,textarea{font:inherit}.app{max-width:var(--max);margin:0 auto}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:14px;min-width:0}
    .logo{width:52px;height:52px;border:1px solid var(--line);border-radius:14px;background:#fff;display:grid;place-items:center;overflow:hidden;flex:0 0 auto;padding:0;cursor:pointer}
    .logo img{width:74%;height:74%;object-fit:contain;display:block}.brand h1{margin:0;font-size:1rem;font-weight:600;letter-spacing:-.02em;line-height:1.2}.step-counter{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
    .progress-shell{width:100%;height:9px;border-radius:999px;background:#fff;border:1px solid var(--line);overflow:hidden;margin-bottom:12px}.progress-bar{width:0;height:100%;background:linear-gradient(90deg,var(--brand),#2bb9ef);transition:width .35s var(--ease)}
    .step-nav{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 20px;padding:0}.step-chip{appearance:none;border:1px solid var(--line);background:#fff;color:var(--muted);padding:9px 13px;border-radius:999px;font-size:.82rem;cursor:pointer;transition:.18s ease}.step-chip.current{background:#111;color:#fff;border-color:#111;box-shadow:var(--shadow)}.step-chip.done{color:#087db0;border-color:rgba(0,157,223,.35);background:linear-gradient(180deg,#fff,#f7fcff)}.step-chip.locked{opacity:.48;cursor:not-allowed}
    .hero{margin-bottom:14px}.title{margin:0 0 8px;font-size:clamp(1.55rem,3.7vw,2.1rem);line-height:1.08;letter-spacing:-.03em;font-weight:600;max-width:36ch}.subtitle{margin:0;max-width:72ch;font-size:.92rem;line-height:1.46;color:#4f4f4c}.notice{display:none;margin-top:14px;padding:14px 16px;border-radius:12px;border:1px solid #f0ddbe;background:#fff7eb;color:var(--warn);font-size:.92rem;line-height:1.55}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 460px;gap:18px;align-items:start}.main-col{min-width:0}.preview-panel{position:sticky;top:18px;background:linear-gradient(180deg,#ffffff,#fbfbfa);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow-card)}.preview-head{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}.preview-head h3{margin:0;font-size:.95rem;letter-spacing:-.01em;color:var(--muted);font-weight:500}.preview-stage{position:relative;border:1px solid #efede7;border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#fdfefe 0%,#f6f6f3 40%,#efede8 100%);min-height:360px;box-shadow:inset 0 1px 0 rgba(255,255,255,.55)}.preview-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,157,223,.015) 1px, transparent 1px),linear-gradient(90deg, rgba(0,157,223,.015) 1px, transparent 1px);background-size:24px 24px;pointer-events:none;opacity:.55}.room-preview{position:absolute;inset:0;z-index:1;min-height:360px}.room-preview canvas{display:block;width:100% !important;height:100% !important;outline:none}.preview-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:28px}.preview-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:#f7fbfd;border:1px solid rgba(0,157,223,.16);color:#0b607f;font-size:.78rem;line-height:1}.preview-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);flex:0 0 auto;box-shadow:0 0 0 4px rgba(0,157,223,.10)}
    .content{animation:fadeIn .24s var(--ease)}.helper{margin:0 0 8px;color:var(--muted);font-size:.88rem;line-height:1.45}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.cards.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.cards.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.cards.step-room-size{grid-template-columns:repeat(4,minmax(0,1fr))}.cards.compact-options{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.card{appearance:none;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);text-align:left;padding:14px;min-height:112px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .22s var(--ease),border-color .22s var(--ease),box-shadow .22s var(--ease),background .22s var(--ease);overflow:hidden}.card:hover{transform:translateY(-2px);border-color:var(--line-strong);box-shadow:var(--shadow)}.card.selected{border-color:rgba(0,157,223,.35);background:linear-gradient(180deg,#fff,#f9fdff);box-shadow:0 0 0 2px rgba(0,157,223,.08),var(--shadow-card)}.card.disabled{opacity:.48;filter:grayscale(.04);cursor:not-allowed;transform:none !important;box-shadow:none}.compact-choice{min-height:92px;justify-content:center;align-items:center;text-align:center;padding:12px}.meta{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.meta>div{min-width:0}.card-title{margin:0 0 6px;font-size:1rem;font-weight:600;letter-spacing:-.02em;line-height:1.28;overflow-wrap:anywhere}.card-desc{margin:0;font-size:.84rem;line-height:1.42;color:#565652;white-space:nowrap}.mini-label{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;max-width:44%;padding:5px 8px;border-radius:999px;border:1px solid #ece9e2;background:#f6f5f1;color:#88857e;font-size:10px;letter-spacing:.08em;text-transform:uppercase;text-align:center}
    .summary-grid,.form-grid{display:grid;gap:10px}.summary-grid{grid-template-columns:repeat(2,minmax(0,1fr));margin-bottom:10px}.form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.summary-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}.summary-card h4{margin:0 0 8px;font-size:.92rem;font-weight:500;color:var(--muted)}.summary-card p,.summary-card ul{margin:0;padding-left:0;list-style-position:inside;line-height:1.6;color:var(--text)}.field{display:grid;gap:8px}.field.full{grid-column:1 / -1}label{font-size:.9rem;color:#2f2f2c}.required{color:#cf2f2f}input,textarea{width:100%;min-height:48px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);outline:none;transition:border-color .18s ease, box-shadow .18s ease}textarea{min-height:110px;resize:vertical}input:focus,textarea:focus{border-color:rgba(0,157,223,.4);box-shadow:0 0 0 3px rgba(0,157,223,.10)}.check{display:flex;gap:10px;align-items:flex-start;padding:14px;border-radius:12px;border:1px solid var(--line);background:#fff}.check input{width:18px;min-height:18px;margin-top:2px;box-shadow:none}
    .actions{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-top:22px;padding-top:16px;border-top:1px solid var(--line)}.status{font-size:.9rem;line-height:1.5;color:var(--muted);max-width:58ch}.btn-row{display:flex;gap:8px;flex-wrap:wrap}.btn{appearance:none;border:none;min-height:44px;padding:0 18px;border-radius:999px;font-size:.92rem;font-weight:500;cursor:pointer;transition:transform .2s var(--ease),opacity .2s var(--ease),background .2s var(--ease),color .2s var(--ease)}.btn:hover{transform:translateY(-1px)}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}.btn-secondary{background:#fff;color:#222;border:1px solid var(--line)}.btn-primary{background:#111;color:#fff}.btn-primary:hover{background:#222}.success{display:none;margin-top:8px;padding:13px 14px;border-radius:12px;background:#edf8ef;border:1px solid #d7ecd9;color:var(--ok);font-size:.92rem}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}@media (max-width:1120px){.layout{grid-template-columns:1fr}.preview-panel{position:static;order:-1}}@media (max-width:920px){.cards.cols-4,.cards.step-room-size,.cards.compact-options{grid-template-columns:repeat(2,minmax(0,1fr))}}@media (max-width:860px){.summary-grid,.form-grid{grid-template-columns:1fr}}@media (max-width:740px){.cards,.cards.cols-2,.cards.cols-4,.cards.step-room-size,.cards.compact-options{grid-template-columns:1fr}.actions{flex-direction:column;align-items:stretch}.btn-row,.btn{width:100%}.topbar{flex-direction:column;align-items:flex-start}.title{max-width:none}.preview-stage,.room-preview{min-height:250px}}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <button type="button" class="logo" id="logoReloadBtn" aria-label="Seite neu laden">
          <img src="cotive-07.png" alt="Cotive Logo" style="width:74%;height:74%;object-fit:contain;display:block">
        </button>
        <h1>Meetingraum-Konfigurator</h1>
      </div>
      <div class="step-counter" id="progressLabel"></div>
    </header>
    <div class="progress-shell"><div class="progress-bar" id="progressBar"></div></div>
    <nav class="step-nav" id="stepNav" aria-label="Schrittübersicht"></nav>
    <section class="hero"><h2 class="title" id="stepTitle"></h2><p class="subtitle" id="stepSubtitle"></p><div class="notice" id="noticeBox"></div></section>
    <section class="layout">
      <div class="main-col">
          <main class="content" id="content"></main>
          <footer class="actions">
              <div class="status" id="footerNote"></div>
              <div class="btn-row">
                  <button class="btn btn-secondary" id="backBtn">Zurück</button>
                  <button class="btn btn-primary" id="nextBtn">Weiter</button>
              </div>
          </footer>
      </div>
      <aside class="preview-panel" aria-label="Raumvorschau">
          <div class="preview-head"><h3>Vorschau</h3></div>
          <div class="preview-stage">
              <div class="preview-grid"></div>
              <div id="roomPreview" class="room-preview"></div>
          </div>
          <div id="previewLegend" class="preview-legend"></div>
      </aside>
    </section>
  </div>

  <script>
    // ─── THREE.JS 3D ENGINE ───────────────────────────────────────────────────
    let scene, camera, renderer;
    let tableGroup, chairsGroup, displaysGroup;
    let dispSingle, dispDual, dispTouch;
    let standGroup;
    let ceilingMicMesh, soundbarMesh, tableMicsGroup;
    let ptzCamMesh;
    let doorSignMesh;

    function init3DPreview() {
        const container = document.getElementById('roomPreview');
        if (!container || scene) return;

        // Scene
        scene = new THREE.Scene();

        // Camera — view from the LEFT side of the room
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(-3.5, 4.5, 7.5);
        camera.lookAt(0.5, 1.0, -1.0);

        // Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight || 360);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.38);
        dirLight.position.set(3, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // ── Materials ──────────────────────────────────────────────────────
        const floorMat   = new THREE.MeshStandardMaterial({ color: 0xece9e2, roughness: 0.8 });
        const wallMat    = new THREE.MeshStandardMaterial({ color: 0xf2f1ed, roughness: 0.9 });
        const tableMat   = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
        const metalMat   = new THREE.MeshStandardMaterial({ color: 0x909090, roughness: 0.45 });
        const displayMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 });
        const screenMat  = new THREE.MeshStandardMaterial({ color: 0xe3f6fd, emissive: 0x001e30, roughness: 0.1 });
        const brandMat   = new THREE.MeshStandardMaterial({ color: 0x009DDF });
        const doorMat    = new THREE.MeshStandardMaterial({ color: 0xe2ddd4, roughness: 0.75 });
        const doorTrimMat= new THREE.MeshStandardMaterial({ color: 0xb8b3a8, roughness: 0.6 });

        // ── Room ───────────────────────────────────────────────────────────
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const backWall = new THREE.Mesh(new THREE.PlaneGeometry(12, 5), wallMat);
        backWall.position.set(0, 2.5, -4);
        backWall.receiveShadow = true;
        scene.add(backWall);

        // Right wall — now the DOOR wall, clearly visible from left camera
        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(12, 5), wallMat);
        rightWall.position.set(4, 2.5, 0);
        rightWall.rotation.y = -Math.PI / 2;
        rightWall.receiveShadow = true;
        scene.add(rightWall);

        // ── 3D Door on right wall ─────────────────────────────────────────
        // Door casing (reveal) — slightly proud of wall
        const doorReveal = new THREE.Mesh(
            new THREE.BoxGeometry(0.14, 2.48, 1.08),
            doorTrimMat
        );
        doorReveal.position.set(3.93, 1.24, 1.5);
        scene.add(doorReveal);

        // Door panel — inside the casing
        const doorPanel = new THREE.Mesh(
            new THREE.BoxGeometry(0.06, 2.2, 0.92),
            doorMat
        );
        doorPanel.position.set(3.97, 1.1, 1.5);
        doorPanel.castShadow = true;
        scene.add(doorPanel);

        // Door panel detail — inset rectangle
        const doorInset = new THREE.Mesh(
            new THREE.BoxGeometry(0.04, 0.9, 0.7),
            new THREE.MeshStandardMaterial({ color: 0xd5cfc6, roughness: 0.8 })
        );
        doorInset.position.set(3.97, 1.3, 1.5);
        scene.add(doorInset);

        // Door handle
        const handleBar = new THREE.Mesh(
            new THREE.CylinderGeometry(0.018, 0.018, 0.13, 10),
            metalMat
        );
        handleBar.rotation.z = Math.PI / 2;
        handleBar.position.set(3.91, 1.05, 1.13);
        scene.add(handleBar);

        const handleBase = new THREE.Mesh(
            new THREE.CylinderGeometry(0.025, 0.025, 0.04, 10),
            metalMat
        );
        handleBase.position.set(3.94, 1.05, 1.13);
        scene.add(handleBase);

        // ── Room-booking door sign — next to door (toward back of room) ──
        // Glowing panel with brand color
        doorSignMesh = new THREE.Mesh(
            new THREE.BoxGeometry(0.04, 0.26, 0.38),
            new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: 0x009DDF,
                emissiveIntensity: 0.65,
                roughness: 0.2
            })
        );
        doorSignMesh.position.set(3.96, 1.65, 2.35);
        scene.add(doorSignMesh);

        // Small "screen" inset on sign face
        const signScreen = new THREE.Mesh(
            new THREE.PlaneGeometry(0.28, 0.18),
            new THREE.MeshStandardMaterial({ color: 0x00c8ff, emissive: 0x004466, roughness: 0.05 })
        );
        signScreen.rotation.y = -Math.PI / 2;
        signScreen.position.set(3.93, 1.68, 2.35);
        // We add this as child of doorSignMesh so it hides with it
        doorSignMesh.add(signScreen);

        // ── Table ──────────────────────────────────────────────────────────
        tableGroup = new THREE.Group();
        const tableTop = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.08, 1.4), tableMat);
        tableTop.position.set(0, 1.1, 0);
        tableTop.castShadow = true;
        tableTop.receiveShadow = true;
        const tableLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.38, 1.1, 16), metalMat);
        tableLeg.position.set(0, 0.55, 0);
        tableLeg.castShadow = true;
        tableGroup.add(tableTop, tableLeg);
        scene.add(tableGroup);

        chairsGroup = new THREE.Group();
        scene.add(chairsGroup);

        // ── Displays ───────────────────────────────────────────────────────
        displaysGroup = new THREE.Group();
        scene.add(displaysGroup);

        // Single display
        dispSingle = new THREE.Group();
        const sFrame  = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.2, 0.09), displayMat);
        const sScreen = new THREE.Mesh(new THREE.PlaneGeometry(1.88, 1.08), screenMat);
        sScreen.position.z = 0.052;
        dispSingle.add(sFrame, sScreen);
        dispSingle.position.set(0, 2.2, -3.9);
        displaysGroup.add(dispSingle);

        // Dual display
        dispDual = new THREE.Group();
        [-0.78, 0.78].forEach(xOff => {
            const dg = new THREE.Group();
            const dFrame  = new THREE.Mesh(new THREE.BoxGeometry(1.42, 0.88, 0.09), displayMat);
            const dScreen = new THREE.Mesh(new THREE.PlaneGeometry(1.32, 0.78), screenMat);
            dScreen.position.z = 0.052;
            dg.add(dFrame, dScreen);
            dg.position.set(xOff, 2.2, -3.9);
            dispDual.add(dg);
        });
        displaysGroup.add(dispDual);

        // Touch display — clean, professional; same black frame as standard, brand indicator strip
        dispTouch = new THREE.Group();
        const tFrame  = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.5, 0.09), displayMat);
        const tScreen = new THREE.Mesh(new THREE.PlaneGeometry(2.28, 1.38), screenMat);
        tScreen.position.z = 0.052;
        // Thin brand-colour bezel strip at bottom to hint at touch interactivity
        const tStrip = new THREE.Mesh(
            new THREE.PlaneGeometry(2.28, 0.045),
            brandMat
        );
        tStrip.position.set(0, -0.715, 0.054);
        dispTouch.add(tFrame, tScreen, tStrip);
        dispTouch.position.set(0, 2.25, -3.9);
        displaysGroup.add(dispTouch);

        // ── Free-standing trolley / stand ──────────────────────────────────
        // Defined in LOCAL space (z=0); repositioned dynamically in update
        standGroup = new THREE.Group();

        const sPole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 2.3, 14), metalMat);
        sPole1.position.set(-0.5, 1.15, 0);
        const sPole2 = sPole1.clone();
        sPole2.position.set(0.5, 1.15, 0);

        const sBase = new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.09, 0.6), metalMat);
        sBase.position.set(0, 0.045, 0);

        // Base feet (subtle T-shape)
        const sFoot1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.06, 0.9), metalMat);
        sFoot1.position.set(-0.5, 0.03, 0);
        const sFoot2 = sFoot1.clone();
        sFoot2.position.set(0.5, 0.03, 0);

        // Horizontal crossbar connecting poles at top
        const sCrossbar = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.07, 0.07), metalMat);
        sCrossbar.position.set(0, 2.27, 0);

        standGroup.add(sPole1, sPole2, sBase, sFoot1, sFoot2, sCrossbar);
        standGroup.visible = false;
        scene.add(standGroup);

        // ── PTZ Camera — proper camera shape ──────────────────────────────
        ptzCamMesh = new THREE.Group();

        // Wall bracket
        const ptzBracket = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.1, 0.14), metalMat);
        ptzBracket.position.set(0, 0.07, 0.0);
        ptzCamMesh.add(ptzBracket);

        // Pan/tilt head (rounded box)
        const ptzHead = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.14, 0.14), metalMat);
        ptzHead.position.set(0, -0.03, 0);
        ptzCamMesh.add(ptzHead);

        // Camera body
        const ptzBody = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.18, 0.2), displayMat);
        ptzBody.position.set(0, -0.07, 0.03);
        ptzCamMesh.add(ptzBody);

        // Lens barrel — cylinder pointing INTO the room (+Z direction)
        const ptzLensBarrel = new THREE.Mesh(
            new THREE.CylinderGeometry(0.065, 0.08, 0.17, 18),
            new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.35 })
        );
        ptzLensBarrel.rotation.x = -Math.PI / 2;   // align Y→+Z (into room)
        ptzLensBarrel.position.set(0, -0.07, 0.19);
        ptzCamMesh.add(ptzLensBarrel);

        // Lens front glass disc
        const ptzLensGlass = new THREE.Mesh(
            new THREE.CircleGeometry(0.048, 18),
            new THREE.MeshStandardMaterial({ color: 0x08182a, roughness: 0.04, metalness: 0.85 })
        );
        ptzLensGlass.position.set(0, -0.07, 0.283);  // front face of barrel
        ptzCamMesh.add(ptzLensGlass);

        // LED indicator dot
        const ptzLed = new THREE.Mesh(
            new THREE.CircleGeometry(0.012, 8),
            new THREE.MeshStandardMaterial({ color: 0xff2200, emissive: 0xff0000, emissiveIntensity: 0.9 })
        );
        ptzLed.position.set(0.1, -0.03, 0.14);
        ptzCamMesh.add(ptzLed);

        ptzCamMesh.position.set(0, 3.15, -3.82);
        ptzCamMesh.visible = false;
        scene.add(ptzCamMesh);

        // ── Ceiling microphone ─────────────────────────────────────────────
        ceilingMicMesh = new THREE.Group();
        const cMicBase = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.05, 32), brandMat);
        cMicBase.position.set(0, 3.5, 0);
        const cMicRod  = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 1.5, 12), metalMat);
        cMicRod.position.set(0, 4.25, 0);
        ceilingMicMesh.add(cMicBase, cMicRod);
        ceilingMicMesh.visible = false;
        scene.add(ceilingMicMesh);

        // ── Soundbar ───────────────────────────────────────────────────────
        soundbarMesh = new THREE.Mesh(
            new THREE.BoxGeometry(1.55, 0.11, 0.09),
            displayMat
        );
        soundbarMesh.position.set(0, 1.42, -3.9);
        soundbarMesh.visible = false;
        scene.add(soundbarMesh);

        // ── Table microphones ──────────────────────────────────────────────
        tableMicsGroup = new THREE.Group();
        const tMicGeo = new THREE.BoxGeometry(0.14, 0.03, 0.14);
        [-0.8, 0.8].forEach(xOff => {
            const tm = new THREE.Mesh(tMicGeo, displayMat);
            tm.position.set(xOff, 1.15, 0);
            tableMicsGroup.add(tm);
        });
        tableMicsGroup.visible = false;
        scene.add(tableMicsGroup);

        // Resize listener
        window.addEventListener('resize', () => {
            if (!container) return;
            camera.aspect = container.clientWidth / (container.clientHeight || 360);
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight || 360);
            renderer.render(scene, camera);
        });
    }

    // ── Chair generation ──────────────────────────────────────────────────
    function generateChairs(count, tScaleX, tScaleZ) {
        while (chairsGroup.children.length > 0) {
            chairsGroup.remove(chairsGroup.children[0]);
        }
        const chairMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a });
        const seatGeo  = new THREE.BoxGeometry(0.4, 0.07, 0.42);
        const backGeo  = new THREE.BoxGeometry(0.4, 0.38, 0.07);
        const legGeo   = new THREE.CylinderGeometry(0.018, 0.018, 0.5, 8);

        const tWidth = 2.8 * tScaleX;
        const tDepth = 1.4 * tScaleZ;
        const chairsPerSide = count / 2;
        const spacing = tWidth / (chairsPerSide + 1);

        for (let i = 0; i < chairsPerSide; i++) {
            const xPos = (-tWidth / 2) + spacing * (i + 1);

            // Front row — person faces -Z (toward display)
            const cF = new THREE.Group();
            const seatF = new THREE.Mesh(seatGeo, chairMat); seatF.position.y = 0.5;
            const backF = new THREE.Mesh(backGeo, chairMat); backF.position.set(0, 0.69, 0.18);
            // 4 legs
            [[-0.16,-0.16],[0.16,-0.16],[-0.16,0.16],[0.16,0.16]].forEach(([lx,lz]) => {
                const leg = new THREE.Mesh(legGeo, chairMat); leg.position.set(lx, 0.25, lz); cF.add(leg);
            });
            cF.add(seatF, backF);
            cF.position.set(xPos, 0, tDepth / 2 + 0.32);
            chairsGroup.add(cF);

            // Back row — person faces +Z (toward display)
            const cB = new THREE.Group();
            const seatB = new THREE.Mesh(seatGeo, chairMat); seatB.position.y = 0.5;
            const backB = new THREE.Mesh(backGeo, chairMat); backB.position.set(0, 0.69, -0.18);
            [[-0.16,-0.16],[0.16,-0.16],[-0.16,0.16],[0.16,0.16]].forEach(([lx,lz]) => {
                const leg = new THREE.Mesh(legGeo, chairMat); leg.position.set(lx, 0.25, lz); cB.add(leg);
            });
            cB.add(seatB, backB);
            cB.position.set(xPos, 0, -tDepth / 2 - 0.32);
            chairsGroup.add(cB);
        }
    }

    // ── Main 3D update ───────────────────────────────────────────────────
    function update3DPreview(a) {
        if (!scene) return;

        // 1. Room size → table scale + chair count
        const size = a.roomSize;
        if (size === 'huddle') {
            tableGroup.scale.set(0.68, 1, 0.72);
            generateChairs(4, 0.68, 0.72);
        } else if (size === 'large' || size === 'custom_project') {
            tableGroup.scale.set(1.58, 1, 1.1);
            generateChairs(14, 1.58, 1.1);
        } else {
            // medium (default)
            tableGroup.scale.set(1.0, 1, 1.0);
            generateChairs(8, 1.0, 1.0);
        }

        // 2. Display visibility
        dispSingle.visible = (a.display === 'single' || (!a.display && Boolean(size)));
        dispDual.visible   = (a.display === 'dual');
        dispTouch.visible  = (a.display === 'touch');

        // 3. Mounting — move display + stand in/out from wall
        if (a.mounting === 'free') {
            // Pull display group away from wall; stand sits behind it
            displaysGroup.position.z = 1.4;           // world z: -3.9 + 1.4 = -2.5
            standGroup.position.set(0, 0, -2.62);      // slightly behind display at -2.5
            standGroup.visible = true;
            soundbarMesh.position.z = -2.5;
            ptzCamMesh.position.z   = -2.5;
        } else {
            displaysGroup.position.z = 0;              // default: against back wall
            standGroup.visible = false;
            soundbarMesh.position.z = -3.9;
            ptzCamMesh.position.z   = -3.82;
        }

        // 4. Audio
        if (a.ceilingMic === 'yes') {
            ceilingMicMesh.visible  = true;
            soundbarMesh.visible    = false;
            tableMicsGroup.visible  = false;
        } else if (a.ceilingMic === 'no' || a.ceilingMic === 'unsure') {
            ceilingMicMesh.visible  = false;
            soundbarMesh.visible    = true;
            tableMicsGroup.visible  = true;
        } else {
            ceilingMicMesh.visible  = false;
            soundbarMesh.visible    = false;
            tableMicsGroup.visible  = false;
        }

        // 5. PTZ camera — height depends on active display
        ptzCamMesh.visible = (a.requirements && a.requirements.includes('ptz'));
        if      (a.display === 'touch')  ptzCamMesh.position.y = 3.35;
        else if (a.display === 'single') ptzCamMesh.position.y = 3.2;
        else                             ptzCamMesh.position.y = 3.05;

        // 6. Door sign (glowing panel next to door)
        doorSignMesh.visible = (a.doorSign === 'yes');

        renderer.render(scene, camera);
    }

    function escapeHtml(v=''){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
    function summaryIndex(){return steps.findIndex(s=>s.key===SUMMARY_KEY)}
    function markVisited(i){state.maxVisitedStep=Math.max(state.maxVisitedStep,i)}
    function isCustomPath(){return state.answers.roomSize==='custom_project'}

    function isStepComplete(step){if(step.type==='summary')return true;if(step.optional)return true;const v=state.answers[step.key];if(step.type==='multi')return Array.isArray(v)&&v.length>0;return v!==''}
    function canContinue(){const step=steps[state.currentStep];if(step.type==='summary'){const c=state.answers.contact;return Boolean(c.name&&c.company&&c.email&&c.phone&&c.privacy)}return isStepComplete(step)}
    function getProgress(){const total=steps.length,current=state.currentStep+1;return{current,total,percent:Math.round((current/total)*100)}}

    function updateDependencies(changedKey,value){
        if(changedKey==='roomSize'){
            if(value==='huddle'&&state.answers.display==='dual')state.answers.display='';
            if(['large','custom_project'].includes(value)&&state.answers.budget==='under_5000')state.answers.budget='';
        }
    }

    function renderStepNav(){
        const summaryIdx=summaryIndex(),customPath=isCustomPath();
        els.stepNav.innerHTML=steps.map((step,i)=>{
            const current=i===state.currentStep;
            const canJump=customPath?(i===0||i===summaryIdx):i<=state.maxVisitedStep;
            const done=customPath?((i===0&&Boolean(state.answers.roomSize))||(i===summaryIdx&&state.currentStep===summaryIdx)):(i<state.currentStep||(i<steps.length-1&&isStepComplete(step)));
            return `<button type="button" class="step-chip ${current?'current':''} ${done?'done':''} ${canJump?'':'locked'}" data-step-index="${i}" ${canJump?'':'disabled'}>${escapeHtml(step.navLabel)}</button>`;
        }).join('');
        els.stepNav.querySelectorAll('.step-chip').forEach(btn=>btn.addEventListener('click',()=>{
            const i=Number(btn.dataset.stepIndex);
            const customPath2=isCustomPath();
            const canJump=customPath2?(i===0||i===summaryIndex()):i<=state.maxVisitedStep;
            if(Number.isInteger(i)&&canJump){state.currentStep=i;render();}
        }));
    }

    function renderCards(step){
        const current=state.answers[step.key];
        const textOnlySteps=['requirements','roomConditions'];
        const colsClass=step.key==='roomSize'?'step-room-size':step.key==='manufacturer'?'compact-options':textOnlySteps.includes(step.key)?'cols-2':step.options.length===2?'cols-2':step.options.length>=4?'cols-4':'';
        const helper=typeof step.helper==='function'?step.helper():'';
        const cards=step.options.map(option=>{
            const disabled=typeof option.disabled==='function'?option.disabled():false;
            const selected=step.type==='multi'?current.includes(option.value):current===option.value;
            if(step.key==='manufacturer') return `<button type="button" class="card compact-choice ${selected?'selected':''} ${disabled?'disabled':''}" data-value="${option.value}" ${disabled?'disabled':''}><div class="card-title">${escapeHtml(option.title)}</div></button>`;
            if(textOnlySteps.includes(step.key)) return `<button type="button" class="card ${selected?'selected':''} ${disabled?'disabled':''}" data-value="${option.value}" ${disabled?'disabled':''}><div><div class="card-title">${escapeHtml(option.title)}</div><p class="card-desc">${escapeHtml(option.desc)}</p></div></button>`;
            return `<button type="button" class="card ${selected?'selected':''} ${disabled?'disabled':''}" data-value="${option.value}" ${disabled?'disabled':''}><div class="meta"><div><div class="card-title">${escapeHtml(option.title)}</div><p class="card-desc">${escapeHtml(option.desc||'')}</p></div>${option.tag?`<span class="mini-label">${escapeHtml(option.tag)}</span>`:''}</div></button>`;
        }).join('');
        return `${helper?`<p class="helper">${escapeHtml(helper)}</p>`:''}<div class="cards ${colsClass}">${cards}</div>`;
    }

    function listLabels(key,values){if(!Array.isArray(values)||!values.length)return '<p>Keine Auswahl</p>';return `<ul>${values.map(v=>`<li>${escapeHtml(optionLabelMap[key][v]||v)}</li>`).join('')}</ul>`}
    function getPayload(){return {roomSize:state.answers.roomSize||null,budget:state.answers.budget||null,display:state.answers.display||null,doorSign:state.answers.doorSign==='yes',mounting:state.answers.mounting||null,ceilingMic:state.answers.ceilingMic||null,requirements:state.answers.requirements,roomConditions:state.answers.roomConditions,manufacturer:state.answers.manufacturer||null,manufacturerLabel:optionLabelMap.manufacturer[state.answers.manufacturer]||null,contact:{name:state.answers.contact.name,company:state.answers.contact.company,email:state.answers.contact.email,phone:state.answers.contact.phone,message:state.answers.contact.message}}}

    const apiService={async submitLead(payload){await new Promise(r=>setTimeout(r,700));return {ok:true,status:200,data:payload}}};

    function renderSummary(){

        return `${customOnly?`<div class="summary-card" style="margin-bottom:10px;"><h4>Projektart</h4><p>17+ / Sonderprojekt</p></div>`:`<div class="summary-grid"><div class="summary-card"><h4>Raumgröße</h4><p>${escapeHtml(optionLabelMap.roomSize[state.answers.roomSize]||'-')}</p></div><div class="summary-card"><h4>Budget</h4><p>${escapeHtml(optionLabelMap.budget[state.answers.budget]||'-')}</p></div><div class="summary-card"><h4>Display</h4><p>${escapeHtml(optionLabelMap.display[state.answers.display]||'-')}</p></div><div class="summary-card"><h4>Türschild</h4><p>${escapeHtml(optionLabelMap.doorSign[state.answers.doorSign]||'-')}</p></div><div class="summary-card"><h4>Montage</h4><p>${escapeHtml(optionLabelMap.mounting[state.answers.mounting]||'-')}</p></div><div class="summary-card"><h4>Deckenmikrofon</h4><p>${escapeHtml(optionLabelMap.ceilingMic[state.answers.ceilingMic]||'-')}</p></div><div class="summary-card"><h4>Funktionen</h4>${listLabels('requirements',state.answers.requirements)}</div><div class="summary-card"><h4>Raumgegebenheiten</h4>${listLabels('roomConditions',state.answers.roomConditions)}</div><div class="summary-card"><h4>Hersteller</h4><p>${escapeHtml(optionLabelMap.manufacturer[state.answers.manufacturer]||'-')}</p></div></div>`}<div class="summary-card" style="margin-bottom:10px;"><h4>${customOnly?'Anfrage':'Kontakt'}</h4>${customOnly?'<p style="margin:0 0 14px;color:var(--muted);">Kurze Stichworte genügen.</p>':''}<div class="form-grid"><div class="field"><label for="name">Name <span class="required">*</span></label><input id="name" placeholder="Max Mustermann" value="${escapeHtml(state.answers.contact.name)}" /></div><div class="field"><label for="company">Firma <span class="required">*</span></label><input id="company" placeholder="Muster GmbH" value="${escapeHtml(state.answers.contact.company)}" /></div><div class="field"><label for="email">E-Mail <span class="required">*</span></label><input id="email" type="email" placeholder="name@firma.de" value="${escapeHtml(state.answers.contact.email)}" /></div><div class="field"><label for="phone">Telefon <span class="required">*</span></label><input id="phone" placeholder="+49 ..." value="${escapeHtml(state.answers.contact.phone)}" /></div><div class="field full"><label for="message">Nachricht</label><textarea id="message" placeholder="Weitere Hinweise ...">${escapeHtml(state.answers.contact.message)}</textarea></div><div class="field full"><label class="check"><input id="privacy" type="checkbox" ${state.answers.contact.privacy?'checked':''} /><span>Ich stimme der Verarbeitung meiner Daten zu. <span class="required">*</span></span></label></div></div></div><div class="summary-card"><h4>Debug / Demo</h4><details><summary><span>JSON Payload anzeigen</span></summary><pre id="jsonPreview" style="font-size:.78rem;overflow:auto;margin:8px 0 0;padding:12px;background:#f5f4f1;border-radius:8px;">${escapeHtml(JSON.stringify(payload,null,2))}</pre></details><div class="success" id="successBox">Demo erfolgreich an den API-Layer übergeben.</div></div>`;
    }

    function updateJsonPreview(){const pre=document.getElementById('jsonPreview');if(pre)pre.textContent=JSON.stringify(getPayload(),null,2)}

    function bindCardEvents(step){
        els.content.querySelectorAll('.card').forEach(card=>card.addEventListener('click',()=>{
            const value=card.dataset.value;
            if(step.type==='single'){state.answers[step.key]=value;updateDependencies(step.key,value)}
            else{const list=state.answers[step.key];const idx=list.indexOf(value);if(idx>-1)list.splice(idx,1);else list.push(value)}
            markVisited(state.currentStep);render();
        }));
    }

    function bindSummaryInputs(){
        ['name','company','email','phone','message'].forEach(id=>document.getElementById(id)?.addEventListener('input',e=>{state.answers.contact[id]=e.target.value;updateJsonPreview();els.nextBtn.disabled=!canContinue()}));

    function buildPreviewLegend(a){
        const chips=[];
        const add=label=>chips.push(`<span class="preview-chip"><span class="preview-dot"></span>${escapeHtml(label)}</span>`);

    function render(){
        const step=steps[state.currentStep],progress=getProgress();
        els.progressLabel.textContent=`Schritt ${progress.current} von ${progress.total}`;
        els.progressBar.style.width=`${progress.percent}%`;
        els.stepTitle.textContent=step.title;
        els.stepSubtitle.textContent=step.subtitle||'';
        const note=typeof step.note==='function'?step.note():'';
        els.noticeBox.style.display=note?'block':'none';
        els.noticeBox.textContent=note;
        renderStepNav();
        if(step.type==='summary'){
            els.content.innerHTML=renderSummary();
            bindSummaryInputs();
            els.nextBtn.textContent='Anfrage absenden';
            els.footerNote.textContent=isCustomPath()?'Kontaktdaten eingeben.':'Pflichtfelder ausfüllen.';
        } else {
            els.content.innerHTML=renderCards(step);
            bindCardEvents(step);
            els.nextBtn.textContent='Weiter';
            if(step.key==='manufacturer')els.footerNote.textContent='';
            else if(step.optional&&step.type==='multi')els.footerNote.textContent='Optional';
            else els.footerNote.textContent='';
        }
        els.backBtn.disabled=state.currentStep===0;
        els.nextBtn.disabled=!canContinue();
        renderPreview();
    }

    document.getElementById('logoReloadBtn')?.addEventListener('click',()=>window.location.reload());

    els.backBtn.addEventListener('click',()=>{
        if(isCustomPath()&&state.currentStep===summaryIndex()){state.currentStep=0;render();return}
        if(state.currentStep>0){state.currentStep-=1;markVisited(state.currentStep);render()}
    });

    els.nextBtn.addEventListener('click',async()=>{
        if(!canContinue())return;
        const step=steps[state.currentStep];
        if(step.type!=='summary'){
            if(step.key==='roomSize'&&state.answers.roomSize==='custom_project'){
                const target=summaryIndex();state.currentStep=target;markVisited(target);render();return;
            }
            state.currentStep+=1;markVisited(state.currentStep);render();return;
        }
        els.nextBtn.disabled=true;els.nextBtn.textContent='Wird gesendet ...';
        try{
            const result=await apiService.submitLead(getPayload());
            if(result.ok){
                const success=document.getElementById('successBox');
                if(success)success.style.display='block';
                els.footerNote.textContent='Demo erfolgreich abgeschlossen.';
                els.nextBtn.textContent='Erfolgreich gesendet';
            } else {
                els.nextBtn.textContent='Erneut versuchen';els.nextBtn.disabled=false;
            }
        } catch(err){
            console.error(err);els.footerNote.textContent='Fehler beim Senden.';
            els.nextBtn.textContent='Erneut versuchen';els.nextBtn.disabled=false;
        }
    });

    window.addEventListener('load', () => { render(); });
  </script>
</body>
</html>
